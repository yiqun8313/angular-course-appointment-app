<div class="container">
    <div class="card mt-3">
        <div class="row">
            <div class="col">
                <h2 class="text-center">Todo List</h2>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-9">

                {{ oneWayText }} 
                <input class="form-control" [(ngModel)]="newTodoTitle" placeholder="Enter a new todo">
            </div>
            <div class="col-md-3">
                <button class="btn btn-primary w-100" (click)="addTodo()">Add Todo</button>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-6">
            <div class="alert alert-secondary" role="alert">
                Remaining: {{ remainingCount }} • Completed: {{ completedCount }}
            </div>
        </div>
    </div>

    <ul class="list-group mt-3">
        <li class="list-group-item d-flex justify-content-between align-items-center" *ngFor="let todo of todos; index as i">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" [checked]="todo.completed" (change)="toggleCompleted(todo)" id="todo-{{ todo.id }}">
                <label class="form-check-label" [ngClass]="{ 'text-decoration-line-through': todo.completed }" for="todo-{{ todo.id }}">
                    {{ todo.title }}
                </label>
            </div>
            <button class="btn btn-danger btn-sm" (click)="deleteTodo(i)">Delete</button>
        </li>
    </ul>

</div>
